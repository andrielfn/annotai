name: CI

on:
  push:
    branches: [main]
  pull_request:

# One in-flight run per ref; a new push cancels stale runs (saves minutes on PR updates).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: the test jobs need no write access, which is safe for fork PRs.
permissions:
  contents: read

jobs:
  elixir:
    name: Elixir · mix test
    runs-on: ubuntu-latest
    env:
      MIX_ENV: test
    steps:
      - uses: actions/checkout@v7

      # Versions track .mise.toml — keep them in sync.
      - uses: erlef/setup-beam@v1
        with:
          otp-version: "29.0.2"
          elixir-version: "1.20.2"

      - name: Cache deps and _build
        uses: actions/cache@v6
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ hashFiles('mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-

      - run: mix deps.get
      - run: mix deps.compile
      - run: mix format --check-formatted
      - run: mix compile --warnings-as-errors
      - run: mix test

  js:
    name: JS widget · bun test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: assets
    steps:
      - uses: actions/checkout@v7

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Cache bun install cache
        uses: actions/cache@v6
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('assets/bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-

      - run: bun install --frozen-lockfile
      - run: bun run format:check
      - run: bun test
